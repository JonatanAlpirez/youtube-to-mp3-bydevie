# yt-playlist-mp3 — example config
# Copia este archivo a ~/.config/yt-playlist-mp3/config.yaml o a ./config.yaml

# Carpeta de salida
output_dir: ~/Music/Playlists

# Formato y calidad de audio
audio_format: mp3
audio_quality: 192  # kbps

# Descarga
concurrency: 3
skip_existing: true
force: false
dry_run: false

# Metadatos
embed_metadata: true
embed_thumbnail: true

# Plantilla de nombre (placeholders: artist, title, album, track_number, playlist, ext)
filename_template: "{playlist}/{track_number:02d} - {artist} - {title}.{ext}"
